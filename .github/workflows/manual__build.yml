name: "Manual Godot Build"

on: 
  workflow_dispatch: # Allows you to click "Run Workflow" on GitHub.com

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Export Game
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Godot Export
        uses: firebelley/godot-export@v5.2.1
        with:
          # Pointing to the specific 4.6.2 Stable Linux binaries for the runner
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-builds-${{ github.run_id }}
          path: /home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/build/archive.zip